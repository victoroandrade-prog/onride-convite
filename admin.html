<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>onRide · Admin Notícias</title>
  <style>
    :root {
      --bg: #0F1A22; --surface: #1C2B36; --surface2: #243544;
      --border: #2A3D4A; --accent: #0EBFBA; --gold: #FFA726;
      --text: #FFFFFF; --text2: #7A9BAA;
      --red: #EF5350; --green: #66BB6A; --amber: #FFA726;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login ─────────────────────────────────────────────── */
    #login-screen { display: flex; align-items: center; justify-content: center;
                    min-height: 100vh; padding: 24px; }
    .login-card { background: var(--surface); border: 1px solid var(--border);
                  border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
                  text-align: center; }
    .logo { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .logo span { color: var(--accent); }
    .login-sub { color: var(--text2); font-size: 14px; margin-bottom: 32px; }

    label { display: block; font-size: 11px; color: var(--text2);
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 6px; text-align: left; }
    label .counter { float: right; text-transform: none; letter-spacing: 0;
                     font-weight: 400; color: var(--text2); }
    label .counter.warn { color: var(--amber); }
    label .counter.full { color: var(--red); }
    input, textarea, select {
      width: 100%; padding: 12px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      outline: none; transition: border-color .2s; font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 130px; line-height: 1.6; }
    select option { background: var(--surface); }
    .ig { margin-bottom: 16px; }

    .btn { padding: 12px 24px; border-radius: 10px; border: none;
           font-size: 14px; font-weight: 600; cursor: pointer;
           transition: opacity .2s; }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-w { width: 100%; }
    .btn-primary  { background: var(--accent); color: #000; }
    .btn-secondary{ background: var(--surface2); color: var(--text);
                    border: 1px solid var(--border); }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
    .btn-edit { background: rgba(14,191,186,.1); color: var(--accent);
                border: 1px solid rgba(14,191,186,.3); }
    .btn-edit:hover { background: rgba(14,191,186,.2); }
    .btn-del  { background: rgba(239,83,80,.1); color: var(--red);
                border: 1px solid rgba(239,83,80,.3); }
    .btn-del:hover  { background: rgba(239,83,80,.2); }

    .err-box { background: rgba(239,83,80,.1); border: 1px solid rgba(239,83,80,.3);
               color: var(--red); padding: 10px 14px; border-radius: 8px;
               font-size: 13px; margin-top: 12px; display: none; }

    /* ── App ────────────────────────────────────────────────── */
    #app { display: none; }
    header { background: var(--surface); border-bottom: 1px solid var(--border);
             padding: 14px 24px; display: flex; align-items: center;
             justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .hlogo { font-size: 18px; font-weight: 800; }
    .hlogo span { color: var(--accent); }
    .hright { display: flex; align-items: center; gap: 12px; }
    #user-email { color: var(--text2); font-size: 13px; }
    #btn-logout { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
                  background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; }
    #btn-logout:hover { border-color: var(--red); color: var(--red); }

    main { max-width: 1200px; margin: 0 auto; padding: 24px;
           display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 768px) { main { grid-template-columns: 1fr; } }

    .card { background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; }
    .card + .card { margin-top: 20px; }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 20px;
                  display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .dot-gold { background: var(--gold); }

    /* Preview */
    .pbar { height: 3px; background: var(--accent);
            border-radius: 3px 3px 0 0; margin: -24px -24px 16px; }
    .pimg { width: 100%; height: 150px; object-fit: cover;
            border-radius: 8px; margin-bottom: 12px; }
    .pcat { display: inline-block; padding: 3px 10px; border-radius: 6px;
            font-size: 10px; font-weight: 700; letter-spacing: .5px;
            text-transform: uppercase; margin-bottom: 10px; }
    .cat-Evento      { background: rgba(255,167,38,.15); color: var(--amber);  border: 1px solid rgba(255,167,38,.3); }
    .cat-Dica        { background: rgba(102,187,106,.15); color: var(--green); border: 1px solid rgba(102,187,106,.3); }
    .cat-Atualização { background: rgba(14,191,186,.15);  color: var(--accent);border: 1px solid rgba(14,191,186,.3); }
    .cat-default     { background: rgba(255,167,38,.15);  color: var(--gold);  border: 1px solid rgba(255,167,38,.3); }
    .ptitulo  { font-size: 16px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    .ptext    { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .pdivider { border-top: 1px solid var(--border); margin: 10px 0; }
    .p-empty  { color: var(--text2); font-size: 13px; text-align: center; padding: 24px 0; }

    /* Lista */
    .ni { padding: 13px 0; border-bottom: 1px solid var(--border);
          display: flex; align-items: flex-start; gap: 12px; }
    .ni:last-child { border-bottom: none; padding-bottom: 0; }
    .ni-info { flex: 1; min-width: 0; }
    .ni-titulo { font-size: 14px; font-weight: 600; margin-bottom: 3px;
                 overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ni-meta { font-size: 11px; color: var(--text2); }
    .ni-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .n-empty { color: var(--text2); font-size: 13px; text-align: center; padding: 32px 0; }

    .fbts { display: flex; gap: 10px; margin-top: 4px; }
    .fbts .btn { flex: 1; }

    .badge-ed { background: rgba(255,167,38,.15); color: var(--amber);
                border: 1px solid rgba(255,167,38,.3); padding: 3px 10px;
                border-radius: 6px; font-size: 11px; font-weight: 600; display: none; }

    .spin { display: inline-block; width: 13px; height: 13px;
            border: 2px solid rgba(0,0,0,.3); border-top-color: #000;
            border-radius: 50%; animation: s .6s linear infinite;
            vertical-align: middle; margin-right: 6px; }
    @keyframes s { to { transform: rotate(360deg); } }

    .toast { position: fixed; bottom: 24px; right: 24px;
             background: var(--surface); border: 1px solid var(--border);
             border-radius: 12px; padding: 12px 20px; font-size: 13px;
             font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,.4);
             transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 99; }
    .toast.show    { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(102,187,106,.4); color: var(--green); }
    .toast.error   { border-color: rgba(239,83,80,.4);   color: var(--red); }
  </style>
</head>
<body>

<!-- ── Login ──────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">on<span>Ride</span></div>
    <div class="login-sub">Painel de Administração</div>
    <div class="ig">
      <label>E-mail</label>
      <input type="email" id="l-email" placeholder="admin@exemplo.com">
    </div>
    <div class="ig">
      <label>Senha</label>
      <input type="password" id="l-pass" placeholder="••••••••">
    </div>
    <button class="btn btn-primary btn-w" id="btn-login">Entrar</button>
    <div class="err-box" id="l-err"></div>
  </div>
</div>

<!-- ── App ────────────────────────────────────────────── -->
<div id="app">
  <header>
    <div class="hlogo">on<span>Ride</span> · Admin</div>
    <div class="hright">
      <span id="user-email"></span>
      <button id="btn-logout">Sair</button>
    </div>
  </header>

  <main>
    <!-- Coluna esquerda: formulário + preview -->
    <div>
      <div class="card">
        <div class="card-title">
          <div class="dot"></div>
          <span id="form-label">Nova Notícia</span>
          <span class="badge-ed" id="badge-ed">Editando</span>
        </div>

        <div class="ig">
          <label>Título * <span class="counter" id="c-titulo">0/120</span></label>
          <input type="text" id="f-titulo" placeholder="Ex: Motociata no Alto da Boa Vista" maxlength="120">
        </div>
        <div class="ig">
          <label>Categoria</label>
          <select id="f-cat">
            <option value="">Sem categoria</option>
            <option value="Evento">Evento</option>
            <option value="Dica">Dica</option>
            <option value="Atualização">Atualização</option>
          </select>
        </div>
        <div class="ig">
          <label>Conteúdo * <span class="counter" id="c-texto">0/300</span></label>
          <textarea id="f-texto" maxlength="300" placeholder="Resumo exibido no card (o app mostra ~6 linhas). Use o link abaixo para a notícia completa."></textarea>
        </div>
        <div class="ig">
          <label>URL da imagem (opcional)</label>
          <input type="url" id="f-img" placeholder="https://...">
        </div>
        <div class="ig">
          <label>Link da notícia completa (opcional)</label>
          <input type="url" id="f-link" placeholder="https://... (abre ao tocar na notícia)">
        </div>

        <div class="fbts">
          <button class="btn btn-primary" id="btn-pub">Publicar</button>
          <button class="btn btn-secondary" id="btn-cancel" style="display:none">Cancelar</button>
        </div>
      </div>

      <!-- Preview -->
      <div class="card" style="margin-top:20px">
        <div class="card-title">
          <div class="dot dot-gold"></div>
          Preview — como aparece no app
        </div>
        <div id="preview"></div>
      </div>
    </div>

    <!-- Coluna direita: lista de notícias -->
    <div class="card" style="align-self:start">
      <div class="card-title">
        <div class="dot"></div>
        Notícias publicadas
        <span id="n-count" style="margin-left:auto;font-size:12px;color:var(--text2);font-weight:400"></span>
      </div>
      <div id="news-list"><div class="n-empty">Carregando...</div></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<!-- ════════════════════════════════════════════════════════
     CONFIGURAÇÃO — preencha com os dados do seu projeto Firebase
     Firebase Console → Configurações do projeto → Seus apps → Web
     ════════════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { initializeAppCheck, ReCaptchaV3Provider }
  from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app-check.js';  
import { getAuth, signInWithEmailAndPassword,
         onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
import { getFirestore, collection, addDoc, updateDoc,
         deleteDoc, doc, onSnapshot, serverTimestamp,
         query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

// Configuração do seu projeto Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDvgG4geysag9xJVk3BrHHjkcUPyqlGtf4",
  authDomain: "onride-ec087.firebaseapp.com",
  projectId: "onride-ec087",
  storageBucket: "onride-ec087.firebasestorage.app",
  messagingSenderId: "553552697458",
  appId: "1:553552697458:web:a1ac69d5f6110dcb398aeb"
};

const app  = initializeApp(firebaseConfig);

// App Check — precisa vir antes de getAuth/getFirestore
initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider('6LfVbDktAAAAACoa3DC5Xx6F-_44jATnpzphLqON'),
  isTokenAutoRefreshEnabled: true,
});

const auth = getAuth(app);
const db   = getFirestore(app);


// ── Estado ───────────────────────────────────────────────
let editingId  = null;
let cachedDocs = [];
let unsubNews  = null;

// ── Helpers de DOM ───────────────────────────────────────
const $ = id => document.getElementById(id);

// ── Auth ─────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    $('login-screen').style.display = 'none';
    $('app').style.display = 'block';
    $('user-email').textContent = user.email;
    startListener();
  } else {
    $('login-screen').style.display = 'flex';
    $('app').style.display = 'none';
    if (unsubNews) { unsubNews(); unsubNews = null; }
  }
});

$('btn-login').addEventListener('click', async () => {
  const email = $('l-email').value.trim();
  const pass  = $('l-pass').value;
  const errEl = $('l-err');
  errEl.style.display = 'none';
  if (!email || !pass) { showErr('Preencha e-mail e senha.'); return; }

  setBtn($('btn-login'), true, '<span class="spin"></span>Entrando...');
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    const m = {
      'auth/invalid-email':     'E-mail inválido.',
      'auth/user-not-found':    'Usuário não encontrado.',
      'auth/wrong-password':    'Senha incorreta.',
      'auth/invalid-credential':'E-mail ou senha incorretos.',
      'auth/too-many-requests': 'Muitas tentativas. Aguarde e tente novamente.',
    };
    showErr(m[e.code] || `Erro: ${e.message}`);
  } finally {
    setBtn($('btn-login'), false, 'Entrar');
  }

  function showErr(msg) {
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }
});

$('l-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('btn-login').click();
});

$('btn-logout').addEventListener('click', () => {
  if (confirm('Deseja sair do painel?')) signOut(auth);
});

// ── Listener em tempo real ───────────────────────────────
function startListener() {
  const q = query(
    collection(db, 'noticias'),
    orderBy('criadoEm', 'desc')
  );
  unsubNews = onSnapshot(q, snap => {
    cachedDocs = snap.docs;
    renderList(snap.docs);
  }, err => {
    $('news-list').innerHTML =
      `<div class="n-empty" style="color:var(--red)">
        Erro ao carregar: ${err.message}<br><br>
        Verifique se a regra do Firestore permite leitura para o seu usuário.
      </div>`;
  });
}

// ── Publicar / Atualizar ─────────────────────────────────
$('btn-pub').addEventListener('click', async () => {
  const titulo  = $('f-titulo').value.trim();
  const conteudo = $('f-texto').value.trim();
  if (!titulo)   { toast('O título é obrigatório.', 'error'); return; }
  if (!conteudo) { toast('O conteúdo é obrigatório.', 'error'); return; }

  const data = {
    titulo,
    conteudo,
    categoria: $('f-cat').value,
    imagemUrl: $('f-img').value.trim(),
    linkUrl: $('f-link').value.trim(),
  };

  const isEdit = !!editingId;
  setBtn($('btn-pub'), true,
    `<span class="spin"></span>${isEdit ? 'Salvando...' : 'Publicando...'}`);

  try {
    if (isEdit) {
      await updateDoc(doc(db, 'noticias', editingId), data);
      toast('Notícia atualizada com sucesso!', 'success');
    } else {
      data.criadoEm = serverTimestamp();
      await addDoc(collection(db, 'noticias'), data);
      toast('Notícia publicada com sucesso!', 'success');
    }
    resetForm();
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
  } finally {
    setBtn($('btn-pub'), false, isEdit ? 'Atualizar' : 'Publicar');
  }
});

$('btn-cancel').addEventListener('click', resetForm);

// ── Editar ───────────────────────────────────────────────
function startEdit(id) {
  const snap = cachedDocs.find(d => d.id === id);
  if (!snap) return;
  const d = snap.data();
  editingId = id;
  $('f-titulo').value  = d.titulo    || '';
  $('f-texto').value   = d.conteudo  || '';
  $('f-cat').value     = d.categoria || '';
  $('f-img').value     = d.imagemUrl || '';
  $('f-link').value    = d.linkUrl   || '';
  updateCounters();
  $('form-label').textContent    = 'Editar Notícia';
  $('btn-pub').textContent       = 'Atualizar';
  $('btn-cancel').style.display  = 'inline-block';
  $('badge-ed').style.display    = 'inline-block';
  updatePreview();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Excluir ──────────────────────────────────────────────
async function deleteNews(id, titulo) {
  if (!confirm(`Excluir "${titulo}"?\n\nEssa ação não pode ser desfeita.`)) return;
  try {
    await deleteDoc(doc(db, 'noticias', id));
    if (editingId === id) resetForm();
    toast('Notícia excluída.', 'success');
  } catch (e) {
    toast('Erro ao excluir: ' + e.message, 'error');
  }
}

// ── Reset formulário ─────────────────────────────────────
function resetForm() {
  editingId = null;
  ['f-titulo', 'f-texto', 'f-img', 'f-link'].forEach(id => $(id).value = '');
  $('f-cat').value = '';
  $('form-label').textContent   = 'Nova Notícia';
  $('btn-pub').textContent      = 'Publicar';
  $('btn-cancel').style.display = 'none';
  $('badge-ed').style.display   = 'none';
  updateCounters();
  updatePreview();
}

// ── Contadores de caracteres ─────────────────────────────
function updateCounters() {
  setCounter('c-titulo', $('f-titulo').value.length, 120);
  setCounter('c-texto',  $('f-texto').value.length, 300);
}
function setCounter(id, len, max) {
  const el = $(id);
  el.textContent = `${len}/${max}`;
  el.classList.toggle('warn', len >= max * 0.9 && len < max);
  el.classList.toggle('full', len >= max);
}
$('f-titulo').addEventListener('input', updateCounters);
$('f-texto').addEventListener('input', updateCounters);

// ── Render lista ─────────────────────────────────────────
function renderList(docs) {
  const list = $('news-list');
  $('n-count').textContent =
    `${docs.length} notícia${docs.length !== 1 ? 's' : ''}`;

  if (!docs.length) {
    list.innerHTML = '<div class="n-empty">Nenhuma notícia publicada ainda.</div>';
    return;
  }

  list.innerHTML = docs.map(snap => {
    const d  = snap.data();
    const ts = d.criadoEm?.toDate?.();
    const dt = ts ? fmtDate(ts) : '—';
    const catBadge = d.categoria
      ? `<span class="pcat cat-${esc(d.categoria)}">${esc(d.categoria)}</span> `
      : '';
    return `
      <div class="ni">
        <div class="ni-info">
          <div class="ni-titulo" title="${esc(d.titulo || '')}">${esc(d.titulo || '(sem título)')}</div>
          <div class="ni-meta">${catBadge}${dt}</div>
        </div>
        <div class="ni-btns">
          <button class="btn btn-sm btn-edit"
            onclick="window.__edit('${snap.id}')">Editar</button>
          <button class="btn btn-sm btn-del"
            onclick="window.__del('${snap.id}','${esc(d.titulo || '')}')">Excluir</button>
        </div>
      </div>`;
  }).join('');

  window.__edit = startEdit;
  window.__del  = deleteNews;
}

// ── Preview ───────────────────────────────────────────────
['f-titulo','f-texto','f-img','f-cat','f-link'].forEach(id =>
  $(id).addEventListener('input', updatePreview)
);

function updatePreview() {
  const titulo  = $('f-titulo').value.trim();
  const texto   = $('f-texto').value.trim();
  const img     = $('f-img').value.trim();
  const cat     = $('f-cat').value;
  const link    = $('f-link').value.trim();
  const el      = $('preview');

  if (!titulo && !texto) {
    el.innerHTML = '<div class="p-empty">Preencha o formulário para ver o preview</div>';
    return;
  }

  const imgHtml = img
    ? `<img src="${esc(img)}" class="pimg" onerror="this.style.display='none'">`
    : '';
  const catHtml = cat
    ? `<span class="pcat cat-${esc(cat)}">${esc(cat)}</span>`
    : '';
  const textoHtml = texto
    ? `<div class="pdivider"></div><div class="ptext">${esc(texto)}</div>`
    : '';
  const linkHtml = link
    ? `<div style="margin-top:12px;color:var(--accent);font-size:12px;font-weight:600">Ler notícia completa →</div>`
    : '';

  el.innerHTML = `
    <div class="pbar"></div>
    ${imgHtml}
    ${catHtml}
    <div class="ptitulo">${esc(titulo) || '<em style="opacity:.5">Sem título</em>'}</div>
    ${textoHtml}
    ${linkHtml}
  `;
}

// ── Utilitários ───────────────────────────────────────────
function fmtDate(d) {
  const m = ['Jan','Fev','Mar','Abr','Mai','Jun',
             'Jul','Ago','Set','Out','Nov','Dez'];
  return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setBtn(el, disabled, html) {
  el.disabled = disabled;
  el.innerHTML = html;
}

let toastTimer;
function toast(msg, type = 'success') {
  const t = $('toast');
  t.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 3500);
}
</script>
</body>
</html>
