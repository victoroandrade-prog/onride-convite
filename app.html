<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>onRide · Web (teste)</title>
  <style>
    :root {
      --bg: #0F1A22; --surface: #1C2B36; --surface2: #243544;
      --border: #2A3D4A; --accent: #0EBFBA; --gold: #FFA726;
      --text: #FFFFFF; --text2: #7A9BAA;
      --red: #EF5350; --green: #66BB6A; --amber: #FFA726;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login ─────────────────────────────────────────────── */
    #login-screen { display: flex; align-items: center; justify-content: center;
                    min-height: 100vh; padding: 24px; }
    .login-card { background: var(--surface); border: 1px solid var(--border);
                  border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
                  text-align: center; }
    .logo { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .logo span { color: var(--accent); }
    .login-sub { color: var(--text2); font-size: 14px; margin-bottom: 32px; }

    label { display: block; font-size: 11px; color: var(--text2);
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 6px; text-align: left; }
    input {
      width: 100%; padding: 12px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      outline: none; transition: border-color .2s; font-family: inherit;
    }
    input:focus { border-color: var(--accent); }
    .ig { margin-bottom: 16px; }

    .btn { padding: 12px 24px; border-radius: 10px; border: none;
           font-size: 14px; font-weight: 600; cursor: pointer;
           transition: opacity .2s; }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-w { width: 100%; }
    .btn-primary { background: var(--accent); color: #000; }

    .err-box { background: rgba(239,83,80,.1); border: 1px solid rgba(239,83,80,.3);
               color: var(--red); padding: 10px 14px; border-radius: 8px;
               font-size: 13px; margin-top: 12px; display: none; }

    /* ── App ────────────────────────────────────────────────── */
    #app { display: none; }
    header { background: var(--surface); border-bottom: 1px solid var(--border);
             padding: 14px 24px; display: flex; align-items: center;
             justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .hlogo { font-size: 18px; font-weight: 800; }
    .hlogo span { color: var(--accent); }
    .hright { display: flex; align-items: center; gap: 12px; }
    #user-email { color: var(--text2); font-size: 13px; }
    #btn-logout { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
                  background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; }
    #btn-logout:hover { border-color: var(--red); color: var(--red); }

    main { max-width: 820px; margin: 0 auto; padding: 24px; }

    .page-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .page-sub { color: var(--text2); font-size: 14px; margin-bottom: 20px; }

    .back { display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
            color: var(--accent); font-size: 13px; font-weight: 600;
            margin-bottom: 16px; background: none; border: none; padding: 0; }
    .back:hover { opacity: .8; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px; margin-bottom: 12px; }
    .card.clickable { cursor: pointer; transition: border-color .2s; }
    .card.clickable:hover { border-color: var(--accent); }
    .card-top { height: 2px; background: var(--accent); border-radius: 2px;
                margin: -18px -18px 14px; }
    .card-top.gold { background: var(--gold); }

    .g-nome { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .g-desc { color: var(--text2); font-size: 13px; line-height: 1.5; margin-bottom: 10px; }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .chip { display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
            background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
    .chip.accent { background: rgba(14,191,186,.13); color: var(--accent);
                   border-color: rgba(14,191,186,.35); }
    .chip.green  { background: rgba(102,187,106,.13); color: var(--green);
                   border-color: rgba(102,187,106,.35); }
    .chip.gold   { background: rgba(255,167,38,.13); color: var(--gold);
                   border-color: rgba(255,167,38,.35); }

    .section-label { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
                     color: var(--text2); font-weight: 700; margin: 22px 0 10px; }

    .p-meta { display: flex; flex-direction: column; gap: 7px; margin-top: 12px; }
    .p-line { display: flex; gap: 8px; font-size: 13px; color: var(--text); }
    .p-line .k { color: var(--text2); min-width: 92px; flex-shrink: 0; }
    .p-line a { color: var(--accent); text-decoration: none; word-break: break-all; }
    .p-line a:hover { text-decoration: underline; }
    .p-foot { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
              display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .p-creator { margin-left: auto; color: var(--text2); font-size: 12px; }

    .empty { color: var(--text2); font-size: 14px; text-align: center; padding: 40px 20px; }
    .spin { display: inline-block; width: 13px; height: 13px;
            border: 2px solid rgba(255,255,255,.25); border-top-color: var(--accent);
            border-radius: 50%; animation: s .6s linear infinite;
            vertical-align: middle; margin-right: 8px; }
    .spin.dark { border-color: rgba(0,0,0,.3); border-top-color: #000; }
    @keyframes s { to { transform: rotate(360deg); } }
    .loading { color: var(--text2); font-size: 14px; text-align: center; padding: 30px; }
  </style>
</head>
<body>

<!-- ── Login ──────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">on<span>Ride</span></div>
    <div class="login-sub">Versão web · visualização de teste</div>
    <div class="ig">
      <label>E-mail</label>
      <input type="email" id="l-email" placeholder="voce@exemplo.com" autocomplete="username">
    </div>
    <div class="ig">
      <label>Senha</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-w" id="btn-login">Entrar</button>
    <div class="err-box" id="l-err"></div>
  </div>
</div>

<!-- ── App ────────────────────────────────────────────── -->
<div id="app">
  <header>
    <div class="hlogo">on<span>Ride</span> · Web</div>
    <div class="hright">
      <span id="user-email"></span>
      <button id="btn-logout">Sair</button>
    </div>
  </header>
  <main id="content"></main>
</div>

<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { initializeAppCheck, ReCaptchaV3Provider }
  from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app-check.js';
import { getAuth, signInWithEmailAndPassword,
         onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
import { getFirestore, collection, query, where, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDvgG4geysag9xJVk3BrHHjkcUPyqlGtf4",
  authDomain: "onride-ec087.firebaseapp.com",
  projectId: "onride-ec087",
  storageBucket: "onride-ec087.firebasestorage.app",
  messagingSenderId: "553552697458",
  appId: "1:553552697458:web:a1ac69d5f6110dcb398aeb"
};

const app = initializeApp(firebaseConfig);
initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider('6LfVbDktAAAAACoa3DC5Xx6F-_44jATnpzphLqON'),
  isTokenAutoRefreshEnabled: true,
});
const auth = getAuth(app);
const db   = getFirestore(app);

const $ = id => document.getElementById(id);
let currentUser = null;

// ── Auth ─────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    $('login-screen').style.display = 'none';
    $('app').style.display = 'block';
    $('user-email').textContent = user.email || '';
    showGroups();
  } else {
    $('login-screen').style.display = 'flex';
    $('app').style.display = 'none';
    $('content').innerHTML = '';
  }
});

$('btn-login').addEventListener('click', doLogin);
$('l-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$('btn-logout').addEventListener('click', () => signOut(auth));

async function doLogin() {
  const email = $('l-email').value.trim();
  const pass  = $('l-pass').value;
  const errEl = $('l-err');
  errEl.style.display = 'none';
  if (!email || !pass) { showErr('Preencha e-mail e senha.'); return; }

  setBtn($('btn-login'), true, '<span class="spin dark"></span>Entrando...');
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    const m = {
      'auth/invalid-email':      'E-mail inválido.',
      'auth/user-not-found':     'Usuário não encontrado.',
      'auth/wrong-password':     'Senha incorreta.',
      'auth/invalid-credential': 'E-mail ou senha incorretos.',
      'auth/too-many-requests':  'Muitas tentativas. Aguarde e tente novamente.',
    };
    showErr(m[e.code] || `Erro: ${e.message}`);
  } finally {
    setBtn($('btn-login'), false, 'Entrar');
  }
  function showErr(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }
}

// ── Meus grupos ──────────────────────────────────────────
async function showGroups() {
  const c = $('content');
  c.innerHTML = '<div class="loading"><span class="spin"></span>Carregando seus grupos...</div>';
  try {
    const snap = await getDocs(query(
      collection(db, 'grupos'),
      where('membros', 'array-contains', currentUser.uid)
    ));
    const grupos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    grupos.sort((a, b) => (a.nome || '').localeCompare(b.nome || ''));

    if (!grupos.length) {
      c.innerHTML = `
        <div class="page-title">Meus grupos</div>
        <div class="empty">Você ainda não participa de nenhum grupo.</div>`;
      return;
    }

    c.innerHTML = `
      <div class="page-title">Meus grupos</div>
      <div class="page-sub">${grupos.length} grupo${grupos.length !== 1 ? 's' : ''}</div>
      <div id="groups"></div>`;

    $('groups').innerHTML = grupos.map(g => {
      const nMembros = Array.isArray(g.membros) ? g.membros.length : 0;
      const desc = g.descricao ? `<div class="g-desc">${esc(g.descricao)}</div>` : '';
      const codigo = g.codigoConvite
        ? `<span class="chip gold">Código ${esc(g.codigoConvite)}</span>` : '';
      return `
        <div class="card clickable" data-gid="${esc(g.id)}">
          <div class="card-top"></div>
          <div class="g-nome">${esc(g.nome || 'Grupo sem nome')}</div>
          ${desc}
          <div class="row">
            <span class="chip accent">${nMembros} membro${nMembros !== 1 ? 's' : ''}</span>
            ${codigo}
          </div>
        </div>`;
    }).join('');

    // Guarda os grupos em memória para reaproveitar membrosNomes na tela de passeios
    window.__grupos = Object.fromEntries(grupos.map(g => [g.id, g]));
    document.querySelectorAll('#groups .card').forEach(el =>
      el.addEventListener('click', () => showPasseios(el.dataset.gid))
    );
  } catch (e) {
    c.innerHTML = `<div class="empty" style="color:var(--red)">
      Erro ao carregar grupos: ${esc(e.message)}</div>`;
  }
}

// ── Passeios de um grupo ─────────────────────────────────
async function showPasseios(gid) {
  const grupo = (window.__grupos || {})[gid] || {};
  const membrosNomes = grupo.membrosNomes || {};
  const c = $('content');
  c.innerHTML = `
    <button class="back" id="btn-back">← Voltar aos grupos</button>
    <div class="page-title">${esc(grupo.nome || 'Passeios')}</div>
    <div class="loading"><span class="spin"></span>Carregando passeios...</div>`;
  $('btn-back').addEventListener('click', showGroups);

  try {
    const snap = await getDocs(query(
      collection(db, 'passeios'),
      where('grupoId', '==', gid)
    ));
    const passeios = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Ordena por dataHora (mais próximos primeiro)
    passeios.sort((a, b) => ms(a.dataHora) - ms(b.dataHora));

    const now = Date.now();
    const fim = p => ms(p.dataHoraRetorno || p.dataHora);
    const proximos   = passeios.filter(p => fim(p) >= now);
    const encerrados = passeios.filter(p => fim(p) <  now).reverse();

    let html = `<button class="back" id="btn-back2">← Voltar aos grupos</button>
      <div class="page-title">${esc(grupo.nome || 'Passeios')}</div>
      <div class="page-sub">${passeios.length} passeio${passeios.length !== 1 ? 's' : ''}</div>`;

    if (!passeios.length) {
      html += '<div class="empty">Nenhum passeio neste grupo ainda.</div>';
    } else {
      if (proximos.length) {
        html += '<div class="section-label">Próximos</div>' +
          proximos.map(p => passeioCard(p, membrosNomes, false)).join('');
      }
      if (encerrados.length) {
        html += '<div class="section-label">Encerrados</div>' +
          encerrados.map(p => passeioCard(p, membrosNomes, true)).join('');
      }
    }
    c.innerHTML = html;
    $('btn-back2').addEventListener('click', showGroups);
  } catch (e) {
    c.innerHTML = `
      <button class="back" id="btn-back3">← Voltar aos grupos</button>
      <div class="empty" style="color:var(--red)">Erro ao carregar passeios: ${esc(e.message)}</div>`;
    $('btn-back3').addEventListener('click', showGroups);
  }
}

function passeioCard(p, membrosNomes, encerrado) {
  const nConf = Array.isArray(p.confirmados) ? p.confirmados.length : 0;
  const nNao  = Array.isArray(p.naoVao) ? p.naoVao.length : 0;
  const confNomes = (p.confirmados || [])
    .map(uid => membrosNomes[uid]).filter(Boolean).slice(0, 8).map(esc).join(', ');

  const linhas = [];
  linhas.push(kv('Quando', fmtDateTime(p.dataHora) +
    (p.dataHoraRetorno ? ' → ' + fmtDateTime(p.dataHoraRetorno) : '')));
  if (p.pontoEncontro) linhas.push(kv('Encontro', esc(p.pontoEncontro)));
  if (p.rota) {
    const rota = p.rotaUrl
      ? `<a href="${esc(p.rotaUrl)}" target="_blank" rel="noopener">${esc(p.rota)}</a>`
      : esc(p.rota);
    linhas.push(kv('Rota', rota, true));
  } else if (p.rotaUrl) {
    linhas.push(kv('Rota', `<a href="${esc(p.rotaUrl)}" target="_blank" rel="noopener">${esc(p.rotaUrl)}</a>`, true));
  }
  if (p.descricao) linhas.push(kv('Detalhes', esc(p.descricao)));

  return `
    <div class="card">
      <div class="card-top ${encerrado ? '' : 'gold'}"></div>
      <div class="g-nome">${esc(p.nome || 'Passeio')}</div>
      <div class="p-meta">${linhas.join('')}</div>
      <div class="p-foot">
        <span class="chip green">${nConf} confirmado${nConf !== 1 ? 's' : ''}</span>
        <span class="chip">${nNao} não ${nNao !== 1 ? 'vão' : 'vai'}</span>
        ${p.criadorNome ? `<span class="p-creator">por ${esc(p.criadorNome)}</span>` : ''}
      </div>
      ${confNomes ? `<div class="p-line" style="margin-top:10px"><span class="k">Vão</span><span>${confNomes}${nConf > 8 ? '…' : ''}</span></div>` : ''}
    </div>`;
}

// ── Utilitários ───────────────────────────────────────────
// v já vem escapado (esc) ou como HTML intencional (ex.: link de rota)
function kv(k, v) {
  return `<div class="p-line"><span class="k">${k}</span><span>${v}</span></div>`;
}
function ms(ts) {
  if (!ts) return 0;
  if (typeof ts.toDate === 'function') return ts.toDate().getTime();
  if (typeof ts.seconds === 'number') return ts.seconds * 1000;
  return 0;
}
function fmtDateTime(ts) {
  const t = ms(ts);
  if (!t) return '—';
  const d = new Date(t);
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()} · ${hh}:${mm}`;
}
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setBtn(el, disabled, html) { el.disabled = disabled; el.innerHTML = html; }
</script>
</body>
</html>
