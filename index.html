<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>onRide — Convite</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F1A22; color: #fff;
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px; text-align: center;
    }
    .card {
      background: #1C2B36; border: 1px solid #2A3D4A;
      border-radius: 20px; padding: 40px 32px; max-width: 380px; width: 100%;
    }
    .logo { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .logo span { color: #0EBFBA; }
    .subtitle { color: #7A9BAA; font-size: 14px; margin-bottom: 32px; }
    .label { font-size: 11px; color: #7A9BAA; letter-spacing: 1.5px;
             text-transform: uppercase; margin-bottom: 10px; }
    .codigo {
      background: rgba(14,191,186,0.08);
      border: 1px solid rgba(14,191,186,0.25);
      border-radius: 12px; padding: 14px 24px;
      font-family: monospace; font-size: 22px; font-weight: 700;
      color: #0EBFBA; letter-spacing: 4px; margin-bottom: 28px;
    }
    .btn {
      display: block; background: #0EBFBA; color: #000;
      padding: 16px; border-radius: 12px; text-decoration: none;
      font-weight: 700; font-size: 16px; margin-bottom: 12px;
    }
    .hint { color: #4A6474; font-size: 12px; line-height: 1.6; margin-top: 16px; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">on<span>Ride</span></div>
    <div class="subtitle">Convite para grupo</div>
    <div id="content"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const codigo = params.get('codigo') || '';
    const el = document.getElementById('content');

    if (codigo) {
      const deepLink = 'onride://convite?codigo=' + encodeURIComponent(codigo);
      el.innerHTML = `
        <div class="label">Código de convite</div>
        <div class="codigo">${codigo}</div>
        <a class="btn" href="${deepLink}">🏍️ Abrir no onRide</a>
        <div class="hint">
          Toque no botão acima para entrar no grupo.<br>
          O app <strong>onRide</strong> precisa estar instalado.
        </div>
      `;
    } else {
      el.innerHTML = '<p class="error">Link de convite inválido ou expirado.</p>';
    }
  </script>
</body>
</html>
